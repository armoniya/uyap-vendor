<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>UYAP Uzaktan Erişim</title>
  <style>
    :root { color-scheme: light dark; }
    html, body { margin: 0; height: 100%; overflow: hidden; background: #0b0d12; }
    #app {
      position: fixed; inset: 0; width: 100%; height: 100%;
      border: 0; background: #fff; display: none;
    }
    #overlay {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; background: radial-gradient(120% 120% at 50% 0%, #16203a 0%, #0b0d12 60%);
      color: #e6e9f2; font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      transition: opacity .4s ease; text-align: center; padding: 24px;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }
    .ring {
      width: 54px; height: 54px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,.12); border-top-color: #5b8cff;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .title { font-size: 19px; font-weight: 600; letter-spacing: -.01em; }
    .msg { font-size: 14px; color: #aab2c8; max-width: 460px; line-height: 1.5; }
    .msg.err { color: #ff8585; }
    .msg.ok { color: #79e0a8; }
    .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:8px; background:#5b8cff; vertical-align: middle; }
    .dot.ok { background:#37d67a; } .dot.warn { background:#f5a623; } .dot.err { background:#ff5b5b; }
    /* Giriş formu (kullanıcı adı + parola) */
    #login { display:none; flex-direction:column; gap:12px; width:300px; max-width:86vw; }
    #login.show { display:flex; }
    #login input {
      background:#0f1730; border:1px solid #2b3a5e; color:#e6e9f2; font-size:15px;
      padding:12px 14px; border-radius:10px; outline:none; width:100%; box-sizing:border-box;
    }
    #login input:focus { border-color:#5b8cff; }
    #login button {
      background:#5b8cff; border:0; color:#fff; font-size:15px; font-weight:600;
      padding:12px 14px; border-radius:10px; cursor:pointer;
    }
    #login button:active { transform: translateY(1px); }
    #login .hint { color:#8b94ac; font-size:12px; line-height:1.5; text-align:center; }
  </style>
</head>
<body>
  <iframe id="app" title="UYAP" allow="clipboard-read; clipboard-write"></iframe>

  <div id="overlay">
    <div class="ring" id="ring"></div>
    <div class="title">UYAP Uzaktan Erişim</div>
    <div class="msg" id="status"><span class="dot warn"></span>Başlatılıyor…</div>

    <form id="login" autocomplete="on">
      <input id="login-user" name="username" type="text" placeholder="Kullanıcı adı" autocapitalize="none" autocorrect="off" required />
      <input id="login-pass" name="password" type="password" placeholder="Parola" required />
      <button id="login-btn" type="submit">Bağlan</button>
      <div class="hint">Büronuzdan aldığınız kullanıcı adı ve parolayla girin.<br>
        <a href="/sifre" target="_blank" rel="noopener" style="color:#5b8cff">Parolamı değiştir</a></div>
    </form>
  </div>

  <script>
    // tunnel.js'in çağırdığı durum/başlat kancaları.
    (function () {
      var statusEl = document.getElementById("status");
      var overlay = document.getElementById("overlay");
      var ring = document.getElementById("ring");
      var iframe = document.getElementById("app");
      var loginForm = document.getElementById("login");
      var userInput = document.getElementById("login-user");
      var passInput = document.getElementById("login-pass");
      var started = false;

      window.__uyapStatus = function (text, level) {
        var cls = level === "ok" ? "ok" : level === "err" ? "err" : level === "warn" ? "warn" : "";
        statusEl.innerHTML = '<span class="dot ' + cls + '"></span>' + escapeHtml(text);
        statusEl.className = "msg" + (level === "err" ? " err" : level === "ok" ? " ok" : "");
        if (level === "err") ring.style.display = "none";
      };

      function showLogin() {
        ring.style.display = "none";
        statusEl.style.display = "none";
        loginForm.classList.add("show");
        setTimeout(function () { userInput.focus(); }, 50);
      }

      // Submit yalnızca BİR KEZ bağlanır (yeniden gösterimlerde tekrar eklenmez).
      loginForm.addEventListener("submit", function (e) {
        e.preventDefault();
        var u = userInput.value.trim();
        var p = passInput.value;
        if (!u || !p) return;
        loginForm.classList.remove("show");
        statusEl.style.display = "";
        ring.style.display = "";
        window.__uyapStatus("Bağlanılıyor…", "warn");
        if (typeof window.__uyapStart === "function") window.__uyapStart(u, p);
      });

      // tunnel.js giriş bilgisi gerektiğinde / hatalı girişten sonra çağırır.
      window.__uyapNeedLogin = showLogin;
      window.__uyapRelogin = function (errText) {
        if (errText) window.__uyapStatus(errText, "err");
        showLogin();
      };

      // Tünel açıldığında UYAP'ı iframe içinde aç (üst sayfa gezinmez, WebRTC yaşar).
      window.__uyapTunnelOpen = function () {
        if (started) return;
        started = true;
        iframe.src = "/giris";
        iframe.style.display = "block";
        setTimeout(function () { overlay.classList.add("hidden"); }, 600);
      };

      function escapeHtml(s) {
        return String(s).replace(/[&<>"]/g, function (c) {
          return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
        });
      }
    })();
  </script>

  <!-- Yapılandırma (vendor_server.py dinamik üretir) + tünel mantığı -->
  <script src="/__app__/config.js"></script>
  <script type="module" src="/__app__/tunnel.js"></script>
</body>
</html>
